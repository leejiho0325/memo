<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메모장</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --purple: #a78bfa;
    --purple-dark: #7c3aed;
    --purple-mid: #8b5cf6;
    --purple-light: #f5f3ff;
    --purple-bg: #faf9ff;
    --text: #1e1b2e;
    --text-muted: #9474c0;
    --border: #e9d5ff;
    --white: #ffffff;
    --shadow: rgba(124,58,237,0.1);
    --green: #1D9E75;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Gowun Dodum', sans-serif; background: var(--purple-bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--white); border-bottom: 1px solid var(--border);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'Nanum Myeongjo', serif; font-size: 19px; font-weight: 700; color: var(--purple-dark); }

  /* TABS */
  .tabs {
    display: flex; gap: 0; margin-left: auto;
    background: var(--purple-light); border-radius: 10px; padding: 3px;
  }
  .tab-btn {
    padding: 6px 16px; border-radius: 8px; border: none;
    background: none; color: var(--text-muted); font-size: 13px;
    cursor: pointer; font-family: 'Gowun Dodum', sans-serif; transition: all 0.15s;
  }
  .tab-btn.active { background: var(--white); color: var(--purple-dark); font-weight: 700; box-shadow: 0 1px 4px var(--shadow); }

  main { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; }

  /* TAB PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ADD BOX */
  .add-box {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 16px; padding: 18px; margin-bottom: 18px;
  }
  .add-box-title { font-size: 13px; font-weight: 700; color: var(--purple-dark); margin-bottom: 12px; }
  .field-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; margin-top: 10px; }
  .field-label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%; padding: 10px 13px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--purple-light);
    color: var(--text); font-family: 'Gowun Dodum', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--purple); }
  textarea { resize: none; line-height: 1.6; }
  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  .link-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .link-hint.ok { color: var(--green); }
  .link-hint.info { color: #378ADD; }
  .btn-save {
    width: 100%; margin-top: 12px; padding: 11px;
    background: linear-gradient(135deg, var(--purple), var(--purple-dark));
    color: white; border: none; border-radius: 12px;
    font-family: 'Gowun Dodum', sans-serif; font-size: 14px;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.88; }

  /* MAP */
  .map-wrap {
    border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
    margin-bottom: 18px; position: relative; height: 300px;
  }
  #map { width: 100%; height: 100%; }
  .map-empty {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); font-size: 13px; gap: 8px;
    pointer-events: none; background: var(--purple-light);
  }
  .map-empty-icon { font-size: 32px; }
  .leaflet-popup-content-wrapper { border-radius: 12px !important; border: 1px solid var(--border) !important; box-shadow: 0 4px 20px var(--shadow) !important; font-family: 'Gowun Dodum', sans-serif !important; }
  .leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; color: var(--text) !important; }
  .popup-name { font-weight: 700; font-size: 14px; color: var(--purple-dark); margin-bottom: 2px; }
  .popup-addr { color: var(--text-muted); font-size: 12px; }

  /* FILTERS */
  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .fbtn {
    padding: 5px 13px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--white); color: var(--text-muted); font-size: 12px;
    cursor: pointer; font-family: 'Gowun Dodum', sans-serif; transition: all 0.15s;
  }
  .fbtn.active { background: var(--purple-dark); color: white; border-color: var(--purple-dark); }

  /* PLACE CARDS */
  .place-list { display: flex; flex-direction: column; gap: 10px; }
  .place-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 13px 15px;
    display: flex; align-items: flex-start; gap: 11px;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  }
  .place-card:hover { border-color: var(--purple); transform: translateY(-1px); }
  .place-card.visited { opacity: 0.5; }
  .place-card.focused { border-color: var(--purple-dark); border-width: 1.5px; }
  .cat-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
  .pinfo { flex: 1; min-width: 0; }
  .pname { font-size: 14px; font-weight: 700; color: var(--purple-dark); }
  .paddr { font-size: 12px; color: var(--text-muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pmemo { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-style: italic; }
  .plinks { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
  .ptag {
    font-size: 11px; padding: 2px 9px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text-muted);
    text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
    background: var(--purple-light);
  }
  .ptag:hover { background: var(--border); }
  .pmeta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .pactions { display: flex; flex-direction: column; gap: 5px; align-items: center; flex-shrink: 0; }
  .iBtn {
    background: none; border: none; cursor: pointer; font-size: 17px;
    color: var(--text-muted); padding: 4px; border-radius: 8px; line-height: 1;
  }
  .iBtn:hover { background: var(--purple-light); }
  .iBtn.done { color: var(--green); }

  /* MEMO TAB */
  .memo-list { display: flex; flex-direction: column; gap: 10px; }
  .memo-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
  }
  .memo-card-title { font-size: 14px; font-weight: 700; color: var(--purple-dark); margin-bottom: 6px; display: flex; justify-content: space-between; align-items: flex-start; }
  .memo-card-body { font-size: 13px; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
  .memo-card-meta { font-size: 11px; color: var(--text-muted); margin-top: 8px; }
  .memo-del { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--text-muted); padding: 2px 4px; border-radius: 6px; line-height: 1; }
  .memo-del:hover { background: var(--purple-light); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state .big { font-size: 38px; display: block; margin-bottom: 10px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--purple-dark); color: white; padding: 10px 22px;
    border-radius: 999px; font-size: 13px; z-index: 999;
    transition: transform 0.3s; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    header h1 { font-size: 16px; }
    .tab-btn { padding: 5px 12px; font-size: 12px; }
    main { padding: 14px 12px 60px; }
    .add-box { padding: 14px; }
    .row2 { flex-direction: column; gap: 6px; }
    .map-wrap { height: 220px; }
    .place-card { padding: 11px 12px; }
    .fbtn { padding: 4px 10px; font-size: 11px; }
    .btn-save { font-size: 14px; }
    input, select, textarea { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>메모장</h1>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('places', this)">📍 갈 곳</button>
    <button class="tab-btn" onclick="switchTab('memo', this)">📝 메모</button>
  </div>
</header>

<main>
  <!-- 갈 곳 탭 -->
  <div class="panel active" id="panel-places">
    <div class="add-box">
      <div class="add-box-title">📍 새 장소 추가</div>
      <div class="field-label">🔗 링크 (카카오맵 / 인스타 / 네이버맵)</div>
      <input type="text" id="inp-link" placeholder="https://..." oninput="onLinkInput(this.value)"/>
      <div class="link-hint" id="link-hint">카카오맵 링크를 붙여넣으면 자동입력 시도해요</div>
      <div class="row2">
        <div>
          <div class="field-label">장소 이름 *</div>
          <input type="text" id="inp-name" placeholder="장소 이름"/>
        </div>
        <div>
          <div class="field-label">카테고리</div>
          <select id="inp-cat">
            <option value="🍽️">🍽️ 음식</option>
            <option value="☕">☕ 카페</option>
            <option value="🎡">🎡 놀거리</option>
            <option value="🛍️">🛍️ 쇼핑</option>
            <option value="🌿">🌿 자연</option>
            <option value="🎬">🎬 문화</option>
            <option value="📍">📍 기타</option>
          </select>
        </div>
      </div>
      <div class="field-label">주소 / 지역 (지도에 표시돼요)</div>
      <input type="text" id="inp-addr" placeholder="예: 서울 마포구 연남동"/>
      <div class="field-label">메모</div>
      <textarea id="inp-memo" placeholder="메모..." style="height:52px"></textarea>
      <button class="btn-save" onclick="addPlace()">저장하기</button>
    </div>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-empty" id="map-empty">
        <span class="map-empty-icon">🗺️</span>
        주소를 입력하면 지도에 표시돼요
      </div>
    </div>

    <div class="filters">
      <button class="fbtn active" onclick="setFilter('전체',this)">전체</button>
      <button class="fbtn" onclick="setFilter('🍽️',this)">🍽️ 음식</button>
      <button class="fbtn" onclick="setFilter('☕',this)">☕ 카페</button>
      <button class="fbtn" onclick="setFilter('🎡',this)">🎡 놀거리</button>
      <button class="fbtn" onclick="setFilter('🛍️',this)">🛍️ 쇼핑</button>
      <button class="fbtn" onclick="setFilter('🌿',this)">🌿 자연</button>
      <button class="fbtn" onclick="setFilter('🎬',this)">🎬 문화</button>
      <button class="fbtn" onclick="setFilter('✅',this)">✅ 다녀온 곳</button>
    </div>
    <div class="place-list" id="place-list"></div>
  </div>

  <!-- 메모 탭 -->
  <div class="panel" id="panel-memo">
    <div class="add-box">
      <div class="add-box-title">📝 새 메모</div>
      <div class="field-label">제목</div>
      <input type="text" id="memo-title" placeholder="제목"/>
      <div class="field-label">내용</div>
      <textarea id="memo-body" placeholder="메모..." style="height:100px"></textarea>
      <button class="btn-save" onclick="addMemo()">저장하기</button>
    </div>
    <div class="memo-list" id="memo-list"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;

// ✏️ 여기에 Supabase 정보 입력
const SUPABASE_URL = "https://rthbdtvkpyltqgasizzj.supabase.co";
const SUPABASE_KEY = "sb_publishable_FSiXXUEqRvngfwfU5_XSyw_U7NsV34p";

let sb = null;
let places = [];
let memos = [];
let filter = '전체';
let map = null;
let markers = [];
let geocodeCache = {};
let currentTab = 'places';

async function initSupabase() {
  if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') return false;
  try {
    sb = createClient(SUPABASE_URL, SUPABASE_KEY);
    const { error } = await sb.from('bucket_places').select('id').limit(1);
    if (error) { console.warn('Supabase 오류:', error.message); sb = null; return false; }
    return true;
  } catch(e) { sb = null; return false; }
}

async function loadAll() {
  if (sb) {
    const [r1, r2] = await Promise.all([
      sb.from('bucket_places').select('*').order('created_at', { ascending: false }),
      sb.from('bucket_memos').select('*').order('created_at', { ascending: false })
    ]);
    if (!r1.error) places = r1.data || [];
    if (!r2.error) memos = r2.data || [];
  } else {
    try { places = JSON.parse(localStorage.getItem('bucket_places') || '[]'); } catch(e) { places = []; }
    try { memos = JSON.parse(localStorage.getItem('bucket_memos') || '[]'); } catch(e) { memos = []; }
  }
  renderPlaces();
  renderMemos();
  initMap();
  updateMapPins();
}

function saveLocal() {
  localStorage.setItem('bucket_places', JSON.stringify(places));
  localStorage.setItem('bucket_memos', JSON.stringify(memos));
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'places' && map) setTimeout(() => map.invalidateSize(), 100);
}

// ── 장소 ──
function detectLinkType(url) {
  if (!url) return null;
  if (url.includes('kakaomap') || url.includes('map.kakao') || url.includes('kko.to') || url.includes('place.kakao')) return 'kakao';
  if (url.includes('naver.me') || url.includes('map.naver') || url.includes('naver.com/local')) return 'naver';
  if (url.includes('instagram.com') || url.includes('instagr.am')) return 'instagram';
  if (url.startsWith('http')) return 'other';
  return null;
}

function onLinkInput(val) {
  const hint = document.getElementById('link-hint');
  if (!val.trim()) { hint.textContent = '카카오맵 링크를 붙여넣으면 자동입력 시도해요'; hint.className = 'link-hint'; return; }
  const type = detectLinkType(val.trim());
  if (type === 'kakao') {
    hint.textContent = '카카오맵 링크 인식됨'; hint.className = 'link-hint info';
    const nameMatch = val.match(/[?&]name=([^&]+)/);
    const addrMatch = val.match(/[?&]addr=([^&]+)/);
    if (nameMatch) document.getElementById('inp-name').value = decodeURIComponent(nameMatch[1]);
    if (addrMatch) document.getElementById('inp-addr').value = decodeURIComponent(addrMatch[1]);
  } else if (type === 'instagram') {
    hint.textContent = '📱 인스타 링크 저장됨'; hint.className = 'link-hint';
  } else if (type === 'naver') {
    hint.textContent = '네이버맵 링크 인식됨'; hint.className = 'link-hint info';
  } else {
    hint.textContent = '링크 저장됨'; hint.className = 'link-hint ok';
  }
}

async function addPlace() {
  const name = document.getElementById('inp-name').value.trim();
  const link = document.getElementById('inp-link').value.trim();
  const cat = document.getElementById('inp-cat').value;
  const addr = document.getElementById('inp-addr').value.trim();
  const memo = document.getElementById('inp-memo').value.trim();
  if (!name) {
    const el = document.getElementById('inp-name');
    el.focus(); el.style.borderColor = '#E24B4A';
    setTimeout(() => el.style.borderColor = '', 1500); return;
  }
  const newPlace = { name, cat, addr, memo, link, link_type: detectLinkType(link), visited: false };
  if (sb) {
    const { data, error } = await sb.from('bucket_places').insert([newPlace]).select().single();
    if (!error && data) places.unshift(data);
    else { showToast('저장 실패: ' + (error?.message || '')); return; }
  } else {
    newPlace.id = Date.now(); newPlace.created_at = new Date().toISOString();
    places.unshift(newPlace); saveLocal();
  }
  ['inp-name','inp-link','inp-addr','inp-memo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('link-hint').textContent = '카카오맵 링크를 붙여넣으면 자동입력 시도해요';
  document.getElementById('link-hint').className = 'link-hint';
  showToast('저장됐어요!'); renderPlaces(); updateMapPins();
}

async function toggleVisited(id) {
  const p = places.find(x => x.id === id); if (!p) return;
  p.visited = !p.visited;
  if (sb) await sb.from('bucket_places').update({ visited: p.visited }).eq('id', id);
  else saveLocal();
  renderPlaces(); updateMapPins();
}

async function deletePlace(id) {
  if (!confirm('삭제할까요?')) return;
  if (sb) await sb.from('bucket_places').delete().eq('id', id);
  places = places.filter(x => x.id !== id);
  if (!sb) saveLocal();
  renderPlaces(); updateMapPins();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); renderPlaces();
}

// ── 메모 ──
async function addMemo() {
  const title = document.getElementById('memo-title').value.trim();
  const body = document.getElementById('memo-body').value.trim();
  if (!title && !body) { showToast('내용을 입력해주세요'); return; }
  const newMemo = { title: title || '제목 없음', body };
  if (sb) {
    const { data, error } = await sb.from('bucket_memos').insert([newMemo]).select().single();
    if (!error && data) memos.unshift(data);
    else { showToast('저장 실패: ' + (error?.message || '')); return; }
  } else {
    newMemo.id = Date.now(); newMemo.created_at = new Date().toISOString();
    memos.unshift(newMemo); saveLocal();
  }
  document.getElementById('memo-title').value = '';
  document.getElementById('memo-body').value = '';
  showToast('저장됐어요!'); renderMemos();
}

async function deleteMemo(id) {
  if (!confirm('삭제할까요?')) return;
  if (sb) await sb.from('bucket_memos').delete().eq('id', id);
  memos = memos.filter(x => x.id !== id);
  if (!sb) saveLocal();
  renderMemos();
}

// ── 지도 ──
function initMap() {
  if (map) return;
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView([37.5665, 126.978], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
}

const catColors = { '🍽️':'#D85A30','☕':'#BA7517','🎡':'#534AB7','🛍️':'#D4537E','🌿':'#3B6D11','🎬':'#185FA5','📍':'#7c3aed' };

function makeIcon(cat, visited) {
  const color = visited ? '#bbb' : (catColors[cat] || '#7c3aed');
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <ellipse cx="14" cy="34" rx="5" ry="2" fill="rgba(0,0,0,0.1)"/>
    <path d="M14 2C8.477 2 4 6.477 4 12c0 7.5 10 22 10 22S24 19.5 24 12C24 6.477 19.523 2 14 2z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="14" cy="12" r="5" fill="white" fill-opacity="0.9"/>
  </svg>`;
  return L.divIcon({ html: svg, iconSize: [28, 36], iconAnchor: [14, 36], popupAnchor: [0, -38], className: '' });
}

async function geocodeAddr(addr) {
  if (!addr) return null;
  if (geocodeCache[addr]) return geocodeCache[addr];
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(addr + ' 한국')}&limit=1&accept-language=ko`);
    const data = await res.json();
    if (data && data[0]) {
      const c = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
      geocodeCache[addr] = c; return c;
    }
  } catch(e) {}
  return null;
}

async function updateMapPins() {
  if (!map) return;
  markers.forEach(m => map.removeLayer(m)); markers = [];
  const withAddr = places.filter(p => p.addr);
  document.getElementById('map-empty').style.display = withAddr.length ? 'none' : 'flex';
  if (!withAddr.length) return;
  const bounds = [];
  for (const p of places) {
    if (!p.addr) continue;
    const coords = p.coords || await geocodeAddr(p.addr);
    if (coords) {
      p.coords = coords;
      const m = L.marker([coords.lat, coords.lng], { icon: makeIcon(p.cat, p.visited) })
        .addTo(map)
        .bindPopup(`<div class="popup-name">${p.cat} ${p.name}${p.visited ? ' ✅' : ''}</div><div class="popup-addr">${p.addr || ''}</div>`)
        .on('click', () => scrollToCard(p.id));
      markers.push(m); bounds.push([coords.lat, coords.lng]);
    }
  }
  if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
}

function scrollToCard(id) {
  const el = document.getElementById('card-' + id); if (!el) return;
  el.classList.add('focused'); el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => el.classList.remove('focused'), 2000);
}

function highlightPin(id) {
  const p = places.find(x => x.id === id);
  if (p && p.coords && map) map.setView([p.coords.lat, p.coords.lng], 15, { animate: true });
}

function getLinkLabel(type) {
  if (type === 'kakao') return '🗺️ 카카오맵';
  if (type === 'naver') return '🗺️ 네이버맵';
  if (type === 'instagram') return '📱 인스타';
  return '🔗 링크';
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('ko-KR');
}

// ── 렌더 ──
function renderPlaces() {
  let filtered = places;
  if (filter === '✅') filtered = places.filter(p => p.visited);
  else if (filter !== '전체') filtered = places.filter(p => p.cat === filter);
  const list = document.getElementById('place-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><span class="big">🗺️</span>아직 장소가 없어요</div>`; return;
  }
  list.innerHTML = filtered.map(p => {
    const linkHtml = p.link ? `<a class="ptag" href="${p.link}" target="_blank" rel="noopener">${getLinkLabel(p.link_type)}</a>` : '';
    return `
    <div class="place-card ${p.visited ? 'visited' : ''}" id="card-${p.id}" onclick="highlightPin(${p.id})">
      <div class="cat-icon">${p.cat}</div>
      <div class="pinfo">
        <div class="pname">${p.name}${p.visited ? ' <span style="font-size:11px;color:#1D9E75;font-weight:400">✅ 다녀옴</span>' : ''}</div>
        ${p.addr ? `<div class="paddr">📍 ${p.addr}</div>` : ''}
        ${p.memo ? `<div class="pmemo">"${p.memo}"</div>` : ''}
        ${linkHtml ? `<div class="plinks">${linkHtml}</div>` : ''}
        <div class="pmeta">${formatDate(p.created_at)}</div>
      </div>
      <div class="pactions">
        <button class="iBtn ${p.visited ? 'done' : ''}" onclick="event.stopPropagation();toggleVisited(${p.id})">${p.visited ? '☑️' : '⬜'}</button>
        <button class="iBtn" onclick="event.stopPropagation();deletePlace(${p.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function renderMemos() {
  const list = document.getElementById('memo-list');
  if (!memos.length) {
    list.innerHTML = `<div class="empty-state"><span class="big">📝</span>메모가 없어요</div>`; return;
  }
  list.innerHTML = memos.map(m => `
    <div class="memo-card">
      <div class="memo-card-title">
        ${m.title}
        <button class="memo-del" onclick="deleteMemo(${m.id})">🗑️</button>
      </div>
      <div class="memo-card-body">${m.body || ''}</div>
      <div class="memo-card-meta">${formatDate(m.created_at)}</div>
    </div>
  `).join('');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

(async () => {
  await initSupabase();
  await loadAll();
})();
</script>
